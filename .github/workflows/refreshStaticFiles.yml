name: Refresh static files

on:
    schedule:
        # Each day at 13:00 Brussels (11:00 UTC)
        - cron: '0 11 * * *'
    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

jobs:
    updater:
        runs-on: ubuntu-latest
        permissions:
          contents: write
          pull-requests: write
        steps:
            - name: 🛎️ Checkout
              uses: actions/checkout@v7
            - name: Setup Node.js ✨
              uses: actions/setup-node@v7
              with:
                node-version: "lts/*"
                cache: 'npm'
            - name: 💻 Install npm packages
              run: npm install
            - name: 🤖 Do the thing
              run: npm run generate-api-json-files
            - name: 💅 Create Pull Request
              uses: peter-evans/create-pull-request@v8
              with:
                title: "[auto-updater] Updated static files"
                token: ${{ secrets.PAT }}
                labels: |
                  automerge
                body: |
                  This is an automated update of static files based on the latest data in the database.

                  @coderabbitai ignore
                draft: false
